<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJOUT ARTICLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50">
    <div>
        <section id="page-accueil" class="w-full min-h-screen flex justify-center items-center py-10">
            <form action="" class="flex flex-col gap-6 w-full max-w-5xl bg-white rounded-lg p-8">
                <div class="flex gap-2">
                    <i class="fa-regular fa-pen-to-square self-center text-2xl text-[#03045E]"></i>
                    <div>
                        <h2 class="text-xl font-bold text-[#03045E] mb-2">Nouveau article</h2>
                        <h3>Remplisser les informations si-dessous pour publier un article</h3>
                    </div>
                </div>

                <div class="flex gap-6 flex-wrap">
                    <div class="flex-1 min-w-[200px] flex flex-col gap-1">
                        <label for="titre">Titre</label>
                        <input type="text" id="titre" placeholder="EX: Comprendre le role du HTML"
                            class="border rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#03045E]">
                    </div>
                    <div class="flex-1 min-w-[200px] flex flex-col gap-1">
                        <label for="branche">Branche</label>
                        <select name="branche" id="branche"
                            class="border rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#03045E]">
                            <option value="">Selectionner une categorie</option>
                            <option value="frontend">Frontend</option>
                            <option value="backend">Backend</option>
                            <option value="fullstack">Full-Stack</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-col gap-1">
                    <label for="contenu">Contenu</label>
                    <textarea rows="5" name="contenu" id="contenu" placeholder="contenu de l'article"
                        class="border rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#03045E]"></textarea>
                </div>

                <div class="flex gap-6 flex-wrap">
                    <div class="flex-1 min-w-[200px] flex flex-col gap-1">
                        <label for="statut">Statut</label>
                        <select id="statut"
                            class="border rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#03045E]">
                            <option value="brouillon">Brouillon</option>
                            <option value="publie">Publié</option>
                        </select>
                    </div>
                    <div class="flex-1 min-w-[200px] flex flex-col gap-1">
                        <label for="date">Date de publication</label>
                        <input type="date" id="date"
                            class="border rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#03045E]">
                    </div>
                </div>

                <div class="flex gap-6 flex-wrap">
                    <div class="flex-1 min-w-[200px] flex flex-col gap-1">
                        <label for="avatar">Image</label>
                        <input type="file" id="avatar" name="avatar" accept="image/png, image/jpeg"
                            class="border rounded-md px-3 py-2 text-sm">
                    </div>
                    <div class="flex-1 min-w-[200px] flex flex-col gap-1">
                        <label for="apercu">Aperçu de l'image</label>
                        <input type="preview" id="apercu" placeholder="apercu de l'image"
                            class="border rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#03045E]">
                    </div>
                </div>
                <div class="flex gap-4 pt-2 w-full">
                    <button
                        class="px-5 py-2  w-full rounded-md border border-[#03045E] text-[#03045E] hover:bg-[#03045E] hover:text-white">Annuler</button>
                    <button
                        class="px-5 py-2 w-full rounded-md  bg-[#03045E] text-white hover:bg-[#03045E] hover:text-white">Enregister</button>

                </div>
            </form>
        </section>
    </div>
